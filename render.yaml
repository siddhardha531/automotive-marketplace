  - type: web
    name: automotive-marketplace
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: automotive-db
          property: connectionString

databases:
  - name: automotive-db
    plan: free

